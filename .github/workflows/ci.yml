name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run checks
        run: make check

      - name: Build image for vulnerability scan
        run: docker build -t evernote-mcp-server:local .

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          version: v0.69.3
          image-ref: evernote-mcp-server:local
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          cache: "true" # Explicit: Trivy uses an older GH actions/cache internally, which still targets deprecated Node.js 20.
